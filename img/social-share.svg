    <!-- "Debt" in darker indigo -->
    <text x="292" y="0" font-family="'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif" font-size="96" font-weight="600" fill="#1E1B4B" letter-spacing="-2" style="fill:rgb(30, 27, 75);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, &quot;SF Pro Display&quot;, system-ui, -apple-system, sans-serif;font-size:96px;font-weight:600;text-anchor:start;dominant-baseline:auto">Debt</text>
    
